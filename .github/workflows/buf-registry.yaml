name: Publish to Buf Schema Registry
on:
  push:
    tags:
      - "*"
    paths:
      - "bolt/**/**.proto"
      - "buf.yaml"
      - "buf.lock"
      
permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Publish to Buf Schema Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
