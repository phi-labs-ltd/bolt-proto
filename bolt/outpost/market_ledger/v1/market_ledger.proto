syntax = "proto3";

package bolt.outpost.market_ledger.v1;

import "bolt/assets/v1/assets.proto";
import "bolt/cex/adapter/v1/cex.proto";
import "bolt/common/numeric/v1/numeric.proto";
import "bolt/common/partners/v1/partners.proto";
import "bolt/outpost/market_ledger/v1/types.proto";
import "bolt/outpost/settlement/v2/settlement.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// The PublicMarketLedgerService exposes the same RPCs as MarketLedgerService but with restricted endpoints for external consumption.
service PublicMarketLedgerService {
  // Streams the running ledger as the initial snapshot, then live updates per block.
  // In-flight hedges are included via the hedge_orders field (cex_order_status=open).
  // field_mask paths: "swaps", "hedge_orders" opt in to those fields.
  rpc SubscribeMarketLedger(SubscribeMarketLedgerRequest) returns (stream SubscribeMarketLedgerResponse);
  // Returns all configs for the given asset (both Long and Short directions).
  rpc GetEngineConfigsForAsset(GetEngineConfigsForAssetRequest) returns (GetEngineConfigsForAssetResponse);
  // Returns all engine configs across all assets and directions.
  rpc GetEngineConfigs(GetEngineConfigsRequest) returns (GetEngineConfigsResponse);
  // Returns the asset config for a single asset, if one exists.
  rpc GetAssetConfig(GetAssetConfigRequest) returns (GetAssetConfigResponse);
  // Returns all asset configs across all assets.
  rpc GetAssetConfigs(GetAssetConfigsRequest) returns (GetAssetConfigsResponse);
  // Returns the current Running ledger for the given asset, or absent if none exists.
  rpc GetOpenMarketLedger(GetOpenMarketLedgerRequest) returns (GetOpenMarketLedgerResponse);
  // Returns all Running ledgers across every asset, ordered by asset name.
  rpc GetOpenMarketLedgers(GetOpenMarketLedgersRequest) returns (GetOpenMarketLedgersResponse);
  // Returns the ledger with the given id.
  rpc GetMarketLedgerById(GetMarketLedgerByIdRequest) returns (GetMarketLedgerByIdResponse);
}

// The PrivateMarketLedgerService exposes RPCs for internal callers only — reachable
// only from the private gRPC port. The MM is the caller for hedge-lifecycle RPCs
// (CloseHedging); operator/admin tooling is the caller for config-write RPCs
// (UpsertEngineConfig, UpsertAssetConfig). Reads of either config live on
// PublicMarketLedgerService for broader consumption.
service PrivateMarketLedgerService {
  // DEPRECATED (BOLT-1827): trigger evaluation moved into the service. Server returns
  // UNIMPLEMENTED. Kept as a deprecated stub to preserve wire compatibility for
  // mainnet-rollback scenarios; will be removed in a follow-up cleanup release once
  // no caller remains.
  rpc StartHedging(StartHedgingRequest) returns (StartHedgingResponse) {
    option deprecated = true;
  }
  // Called by MM. Closes a specific hedge order with fill details. Transitions
  // in_progress → closed. For cancel/error/partial: adds delta back to running
  // ledger, returns updated event.
  rpc CloseHedging(CloseHedgingRequest) returns (CloseHedgingResponse);
  // Called by operator tooling. Inserts or replaces the engine config for a single
  // (asset, direction) pair.
  rpc UpsertEngineConfig(UpsertEngineConfigRequest) returns (UpsertEngineConfigResponse);
  // Called by operator tooling. Inserts or replaces the asset config for a single
  // asset (sign-agnostic). Reads are exposed publicly via PublicMarketLedgerService.
  rpc UpsertAssetConfig(UpsertAssetConfigRequest) returns (UpsertAssetConfigResponse);
}

// ── Shared messages ──────────────────────────────────────────────────────────

// TimeoutStep: One rung of the hedge timeout ladder. Position within its enclosing
// Bucket.timeout_ladder is the rung_idx (no field carried explicitly).
message TimeoutStep {
  // delay: How long to wait before escalating to this strategy.
  google.protobuf.Duration delay = 1;
  // strategy: Execution strategy to use at this timeout rung.
  ExecutionStrategy strategy = 2;
  // spread_bps: Optional spread in basis points applied to this rung's limit price.
  optional bolt.common.numeric.v1.Fraction spread_bps = 3;
}

// Bucket: A single ladder bucket. Splits the hedge into a percentage-sized slice
// with its own timeout ladder. Position within EngineConfig.buckets is the
// bucket_idx (no field carried explicitly).
message Bucket {
  // percent_bps: Share of the hedge routed to this bucket, in basis points
  // (10000 = 100%). Sum across buckets is expected to be 10000.
  uint32 percent_bps = 1;
  // timeout_ladder: Ordered list of timeout rungs for this bucket.
  repeated TimeoutStep timeout_ladder = 2;
}

// EngineConfig: Hedging parameters for a single (asset, direction) pair.
message EngineConfig {
  // asset: Base asset symbol (e.g. "SUI").
  string asset = 1;
  // direction: Position direction this config governs (Long or Short).
  Direction direction = 2;
  // threshold: Delta threshold that triggers a hedge.
  bolt.common.numeric.v1.Fraction threshold = 3;
  // hard_cap: DEPRECATED (BOLT-1827). Full-delta hedging at every threshold breach
  // makes the second-tier escalation cap redundant. Server emits the proto3 default
  // (0) on output and ignores the value on input. Kept on the wire for rollback
  // compatibility; will be removed in a follow-up cleanup release.
  bolt.common.numeric.v1.Fraction hard_cap = 4 [deprecated = true];
  // timeout_ladder: DEPRECATED — superseded by `buckets`. A single flat ladder is
  // equivalent to one Bucket with percent_bps=10000 and the same rungs. Kept on
  // the wire for rollback compatibility; will be removed in a follow-up cleanup
  // release once no caller remains.
  repeated TimeoutStep timeout_ladder = 5 [deprecated = true];
  // buckets: Ordered list of ladder buckets. Each bucket runs its own
  // timeout_ladder over its percent_bps slice of the hedge. Position in this
  // list is the bucket_idx.
  repeated Bucket buckets = 6;
}

// AssetConfig: Per-asset, sign-agnostic policy. Inventory-at-risk duration and
// dust floor apply to long and short equally, so they are not split per direction.
// Service-managed: writes happen via UpsertAssetConfig on PrivateMarketLedgerService
// (operator tooling); reads are exposed via GetAssetConfig / GetAssetConfigs on
// PublicMarketLedgerService. Not carried on MarketLedgerEvent and not required by
// MM (MM is a pure executor; it does not act on these values).
message AssetConfig {
  // asset: Base asset symbol (e.g. "SUI"). Primary key.
  string asset = 1;
  // time_threshold: How long unhedged delta may sit before a TIME trigger fires.
  // Uses google.protobuf.Duration for unit safety and consistency with TimeoutStep.delay.
  google.protobuf.Duration time_threshold = 2;
  // dust_threshold: Below this absolute delta, TIME triggers are suppressed (dust filter).
  // Sign-agnostic; gates TIME only — AMOUNT fires regardless. Set to 0 to disable.
  bolt.common.numeric.v1.Fraction dust_threshold = 3;
}

// SwapEvent: A single swap event ingested from the on-chain pool.
message SwapEvent {
  // id: DB primary key for the swap event row.
  int64 id = 1;
  // swap_id: Unique on-chain swap identifier.
  string swap_id = 2;
  // tx_id: Sui transaction digest that contains this swap.
  string tx_id = 3;
  // base_asset: Base asset symbol for the pool (e.g. "SUI").
  string base_asset = 4;
  // height: Sui checkpoint height at which the swap occurred.
  uint64 height = 5;
  // source: Pool or DEX source identifier.
  string source = 6;
  // sender: On-chain address that initiated the swap.
  string sender = 7;
  // input: Amount and asset sent into the pool.
  bolt.assets.v1.Balance input = 8;
  // output: Amount and asset received from the pool.
  bolt.assets.v1.Balance output = 9;
  // protocol_fee: Fee collected by the protocol.
  bolt.assets.v1.Balance protocol_fee = 10;
  // lp_fee: Fee collected by liquidity providers.
  bolt.assets.v1.Balance lp_fee = 11;
  // price: Effective swap price (quote per base).
  bolt.common.numeric.v1.Fraction price = 12;
  // base_liquidity: Pool base-asset liquidity at the time of the swap.
  bolt.assets.v1.Balance base_liquidity = 13;
  // swap_type: Classification of the swap (e.g. buy, sell).
  bolt.outpost.settlement.v2.SwapType swap_type = 14;
  // originator: Partner that originated this swap.
  bolt.common.partners.v1.Partner originator = 15;
  // timestamp: On-chain timestamp of the swap, if available.
  optional google.protobuf.Timestamp timestamp = 16;
  // created_at: When this swap event row was inserted in the DB.
  google.protobuf.Timestamp created_at = 17;
}

// HedgeOrder: Tracks a hedge from service-side trigger evaluation through CloseHedging.
//
// Field units:
//   Base (SUI):       hedged_delta, filled_amount
//   Quote (USDC):     executed_amount (filled_amount × avg_price)
//   Quote/base ratio: avg_price
//   Currency-tagged:  fee (see fee_currency)
message HedgeOrder {
  // hedge_id: DB primary key. Distinct from cex_order_id.
  int64 hedge_id = 1;
  // ledger_id: FK to the in_progress bolt_market_ledgers row.
  int64 ledger_id = 2;
  // ledger_event_id: FK to bolt_market_ledger_events. UNIQUE — one hedge per event.
  int64 ledger_event_id = 3;
  // cex_order_status: Lifecycle state of this hedge order.
  bolt.cex.adapter.v1.OrderStatus cex_order_status = 4;
  // hedged_delta: Delta subtracted from running ledger at trigger time (signed, base units).
  bolt.common.numeric.v1.Fraction hedged_delta = 5;
  // hedged_vwap: VWAP snapshot at trigger time.
  bolt.common.numeric.v1.Fraction hedged_vwap = 6;
  // internal_order_id: Service-generated UUID (UUID v4) created at trigger time.
  // The server always populates this field on emitted events; MM uses it as the
  // CEX-side idempotency key. Kept as `optional` for wire-format stability with
  // older clients; semantically required by the post-cutover server-side contract.
  optional string internal_order_id = 7;
  // executed_at: When MM initiated the hedge on CEX (MM-provided, millis converted to timestamp).
  google.protobuf.Timestamp executed_at = 8;
  // cex_order_type: Buy or sell side of the hedge. Set at trigger time.
  bolt.outpost.settlement.v2.SwapType cex_order_type = 9;
  // instrument_name: CEX instrument name (e.g. "SUI-USDC"). Set at trigger time.
  string instrument_name = 10;
  // denom: Quote denomination (e.g. "USDC"). Set at trigger time.
  string denom = 11;
  // cex_order_id: CEX-assigned order ID. Set at CloseHedging.
  optional string cex_order_id = 12;
  // cex_order_kind: Market or limit order. Set at CloseHedging.
  optional bolt.cex.adapter.v1.OrderKind cex_order_kind = 13;
  // filled_amount: Base amount actually filled. Set at CloseHedging.
  optional bolt.common.numeric.v1.Fraction filled_amount = 14;
  // executed_amount: Quote value = filled_amount × avg_price. Set at CloseHedging.
  optional bolt.common.numeric.v1.Fraction executed_amount = 15;
  // avg_price: Volume-weighted average fill price. Set at CloseHedging.
  optional bolt.common.numeric.v1.Fraction avg_price = 16;
  // fee: Fee deducted; currency given by fee_currency. Set at CloseHedging.
  optional bolt.common.numeric.v1.Fraction fee = 17;
  // fee_currency: Asset in which the fee was taken.
  optional string fee_currency = 18;
  // memo: Optional order-level note.
  optional string memo = 19;
  // response_msg: Raw CEX response payload as JSON; preserved for audit.
  optional string response_msg = 20;
  // ladder_summary: Summary of the timeout ladder execution for this hedge. Set at CloseHedging.
  optional string ladder_summary = 21;
  // finished_at: When fill/cancel/error completed on CEX (MM-provided). Set at CloseHedging.
  optional google.protobuf.Timestamp finished_at = 22;
  // created_at: When this order row was inserted (service-generated).
  google.protobuf.Timestamp created_at = 23;
  // updated_at: When this order row was last modified.
  google.protobuf.Timestamp updated_at = 24;
}

// MarketLedger: A market ledger row.
message MarketLedger {
  // id: DB primary key for the ledger row.
  int64 id = 1;
  // asset: Base asset symbol (e.g. "SUI").
  string asset = 2;
  // delta: Accumulated net swap delta (signed, base units).
  bolt.common.numeric.v1.Fraction delta = 3;
  // vwap: Volume-weighted average price across accumulated swaps.
  bolt.common.numeric.v1.Fraction vwap = 4;
  // status: Current lifecycle state of this ledger row.
  LedgerStatus status = 5;
  // initial_height: Sui checkpoint height of the first swap in this ledger.
  uint64 initial_height = 6;
  // last_height: Sui checkpoint height of the most recent swap in this ledger.
  uint64 last_height = 7;
  // created_at: When this ledger row was first created.
  google.protobuf.Timestamp created_at = 8;
  // updated_at: When this ledger row was last modified.
  google.protobuf.Timestamp updated_at = 9;
}

// MarketLedgerEvent: Live ledger state for an asset, emitted after processing a block
// or after CloseHedging adjusts the running delta.
//
// Only the running ledger row is sent. In_progress/closed rows are internal bookkeeping.
// In-flight hedges (cex_order_status: created/open) are visible via the hedge_orders field.
// Terminal orders (filled/partially_filled/cancelled/partially_filled_cancelled/closed/error) are excluded.
message MarketLedgerEvent {
  // ledger: Always the running ledger row.
  MarketLedger ledger = 1;
  // ledger_event_id: Persistent ID from bolt_market_ledger_events.
  int64 ledger_event_id = 2;
  // swaps: Swap events accumulated in this ledger, in insertion order.
  // Omitted unless requested via field_mask path "swaps".
  repeated SwapEvent swaps = 3;
  // hedge_orders: In-flight hedge orders (cex_order_status=open) for this asset.
  // Omitted unless requested via field_mask path "hedge_orders".
  repeated HedgeOrder hedge_orders = 4;
  // engine_configs: Engine configs for this asset (up to two entries: one per direction).
  repeated EngineConfig engine_configs = 5;
  // trigger_reason: Why this event fired. The server always sets this field —
  // AMOUNT or TIME on fresh events, and on replay it carries the persisted
  // bolt_hedge_orders.trigger_reason (also AMOUNT or TIME — pre-cutover hedges
  // are backfilled to AMOUNT). UNSPECIFIED is the proto3 enum default sentinel
  // and is not expected on the wire from a post-cutover server.
  TriggerReason trigger_reason = 6;
  // is_replay: True iff this event is a reconnect catch-up replay, not a fresh
  // trigger. The server always sets this field. MM branches behaviour on it
  // (CEX reconcile vs place-fresh-order).
  bool is_replay = 7;
}

// ── Subscribe ────────────────────────────────────────────────────────────────

// SubscribeMarketLedgerRequest: Request to stream live ledger state.
message SubscribeMarketLedgerRequest {
  // field_mask: Paths "swaps", "hedge_orders" to opt in to those fields.
  optional google.protobuf.FieldMask field_mask = 1;
}

// SubscribeMarketLedgerResponse: One frame of the ledger stream.
message SubscribeMarketLedgerResponse {
  // events: Ledger events for each asset, one per active ledger.
  repeated MarketLedgerEvent events = 1;
}

// ── StartHedging (DEPRECATED — BOLT-1827) ────────────────────────────────────

// StartHedgingRequest: DEPRECATED (BOLT-1827) — request to begin hedging for a ledger event.
message StartHedgingRequest {
  option deprecated = true;
  // ledger_event_id: References bolt_market_ledger_events.id -- the event that triggered this hedge.
  int64 ledger_event_id = 1;
  // internal_order_id: MM's internal order tracking ID (optional).
  optional string internal_order_id = 2;
  // executed_at: When MM initiated the hedge on CEX.
  google.protobuf.Timestamp executed_at = 3;
  // cex_order_type: Buy or sell side of the hedge.
  bolt.outpost.settlement.v2.SwapType cex_order_type = 4;
  // executed_amount: Quote value of the hedge order.
  bolt.common.numeric.v1.Fraction executed_amount = 5;
  // instrument_name: CEX instrument name (e.g. "SUI-USDC").
  string instrument_name = 6;
  // denom: Quote denomination (e.g. "USDC").
  string denom = 7;
}

// StartHedgingResponse: DEPRECATED (BOLT-1827) — result of a StartHedging call.
message StartHedgingResponse {
  option deprecated = true;
  // event: Updated running ledger event with adjusted delta/vwap. None when delta == 0 after adjustment.
  optional MarketLedgerEvent event = 1;
  // hedge_order: The newly created hedge order (cex_order_status=open). None when overhedge or direction mismatch.
  optional HedgeOrder hedge_order = 2;
}

// ── CloseHedging ─────────────────────────────────────────────────────────────

// CloseHedgingRequest: Request to close a hedge order with fill details.
message CloseHedgingRequest {
  // ledger_event_id: References bolt_market_ledger_events.id — the event whose hedge to close.
  // Looked up via the 1:1 UNIQUE(ledger_event_id) on bolt_hedge_orders.
  int64 ledger_event_id = 1;
  // internal_order_id: Service-generated UUID echoed back from the triggering event.
  string internal_order_id = 2;
  // hedged_delta: Intent from the triggering event — signed delta the hedge was launched to cover, in base units.
  bolt.common.numeric.v1.Fraction hedged_delta = 3;
  // hedged_vwap: Intent from the triggering event — VWAP snapshot at trigger time.
  bolt.common.numeric.v1.Fraction hedged_vwap = 4;
  // instrument_name: CEX instrument used for the hedge (e.g. "SUI-USDC"). Hedge-level; one instrument per hedge.
  string instrument_name = 5;
  // denom: Quote denomination (e.g. "USDC").
  string denom = 6;
  // executed_at_ms: When MM initiated the hedge on CEX, as epoch milliseconds.
  int64 executed_at_ms = 7;
  // finished_at_ms: When fill/cancel/error completed on CEX, as epoch milliseconds.
  int64 finished_at_ms = 8;
  // memo: Optional hedge-level note.
  string memo = 9;
  // cex_orders: CEX orders the hedge was decomposed into, one record per placed order.
  repeated CexOrderRecord cex_orders = 10;
}

// CexOrderRecord: One CEX order placed during the hedge. Carries the order's
// bucket/rung position, identifiers, intent, fills, and terminal disposition.
message CexOrderRecord {
  // bucket_idx: Position in EngineConfig.buckets (0-based) — which bucket this order belongs to.
  uint32 bucket_idx = 1;
  // rung_idx: Position in Bucket.timeout_ladder (0-based) — which rung this order was placed at.
  uint32 rung_idx = 2;
  // client_order_id: Client-supplied idempotency key, formatted "t-<internal_order_id>-<bucket_idx>".
  string client_order_id = 3;
  // cex_order_id: CEX-assigned order ID. Empty if placement failed before the CEX returned an id.
  string cex_order_id = 4;
  // instrument_name: CEX instrument the order was placed on (e.g. "SUI-USDC").
  string instrument_name = 5;
  // cex_order_kind: Order side — "buy" or "sell".
  string cex_order_kind = 6;
  // cex_order_type: Order type — "limit" or "market".
  string cex_order_type = 7;
  // amount: Planned order size (intent), in base-asset units.
  bolt.common.numeric.v1.Fraction amount = 8;
  // price: Submitted limit price. Omitted for market orders.
  bolt.common.numeric.v1.Fraction price = 9;
  // filled_in_base: Final base-side fill volume.
  bolt.common.numeric.v1.Fraction filled_in_base = 10;
  // filled_in_quote: Final quote-side fill value.
  bolt.common.numeric.v1.Fraction filled_in_quote = 11;
  // avg_deal_price: Volume-weighted average fill price across all fills on this order.
  bolt.common.numeric.v1.Fraction avg_deal_price = 12;
  // fee: Total fee deducted on this order.
  bolt.common.numeric.v1.Fraction fee = 13;
  // fee_currency: Asset in which fee was taken (e.g. "USDT").
  string fee_currency = 14;
  // status: CEX order status using Gate taxonomy — "open", "closed", or "cancelled".
  string status = 15;
  // finish_as: Terminal disposition — "filled", "cancelled", "ioc", "stp", or "error". Empty while open.
  string finish_as = 16;
  // rung_started_at_ms: When the order was placed at this rung, as epoch milliseconds.
  int64 rung_started_at_ms = 17;
  // rung_ended_at_ms: When the order left this rung (terminal, amended, or cancelled), as epoch milliseconds.
  int64 rung_ended_at_ms = 18;
  // error_message: Diagnostic message; populated if an error was observed on this order.
  string error_message = 19;
  // response_msg: Raw CEX response payload for forensics. Stored directly into a JSONB column.
  google.protobuf.Struct response_msg = 20;
}

// CloseHedgingResponse: Result of a CloseHedging call.
message CloseHedgingResponse {
  // event: Updated running ledger event if delta changed (cancel/partial/error). None when filled.
  optional MarketLedgerEvent event = 1;
  // hedge_order: The updated hedge order with fill details.
  HedgeOrder hedge_order = 2;
}

// ── Engine Config ────────────────────────────────────────────────────────────

// UpsertEngineConfigRequest: Request to insert or replace an engine config.
message UpsertEngineConfigRequest {
  // config: The engine config to upsert.
  EngineConfig config = 1;
}

// UpsertEngineConfigResponse: Result of an UpsertEngineConfig call.
message UpsertEngineConfigResponse {
  // config: The persisted engine config after upsert.
  EngineConfig config = 1;
}

// GetEngineConfigsForAssetRequest: Request to fetch engine configs for a single asset.
message GetEngineConfigsForAssetRequest {
  // asset: Base asset symbol to look up (e.g. "SUI").
  string asset = 1;
}

// GetEngineConfigsForAssetResponse: Engine configs for the requested asset.
message GetEngineConfigsForAssetResponse {
  // configs: Up to two configs (one per direction) for the asset.
  repeated EngineConfig configs = 1;
}

// GetEngineConfigsRequest: Request to fetch all engine configs.
message GetEngineConfigsRequest {}

// GetEngineConfigsResponse: All engine configs across all assets.
message GetEngineConfigsResponse {
  // configs: All persisted engine configs.
  repeated EngineConfig configs = 1;
}

// ── Asset Config ─────────────────────────────────────────────────────────────

// UpsertAssetConfigRequest: Request to insert or replace an asset config.
message UpsertAssetConfigRequest {
  // config: The asset config to upsert.
  AssetConfig config = 1;
}

// UpsertAssetConfigResponse: Result of an UpsertAssetConfig call.
message UpsertAssetConfigResponse {
  // config: The persisted asset config after upsert.
  AssetConfig config = 1;
}

// GetAssetConfigRequest: Request to fetch the asset config for a single asset.
message GetAssetConfigRequest {
  // asset: Base asset symbol to look up (e.g. "SUI").
  string asset = 1;
}

// GetAssetConfigResponse: The asset config for the requested asset.
message GetAssetConfigResponse {
  // config: The persisted asset config, or absent if none exists for the asset.
  optional AssetConfig config = 1;
}

// GetAssetConfigsRequest: Request to fetch all asset configs.
message GetAssetConfigsRequest {}

// GetAssetConfigsResponse: All asset configs across all assets.
message GetAssetConfigsResponse {
  // configs: All persisted asset configs.
  repeated AssetConfig configs = 1;
}

// ── Query RPCs ───────────────────────────────────────────────────────────────

// GetOpenMarketLedgerRequest: Request to fetch the running ledger for a single asset.
message GetOpenMarketLedgerRequest {
  // asset: Base asset symbol to look up (e.g. "SUI").
  string asset = 1;
}

// GetOpenMarketLedgerResponse: The running ledger for the requested asset.
message GetOpenMarketLedgerResponse {
  // ledger: The running ledger, or absent if none exists for the asset.
  optional MarketLedger ledger = 1;
}

// GetOpenMarketLedgersRequest: Request to fetch all running ledgers.
message GetOpenMarketLedgersRequest {}

// GetOpenMarketLedgersResponse: All running ledgers across every asset.
message GetOpenMarketLedgersResponse {
  // ledgers: Running ledgers ordered by asset name.
  repeated MarketLedger ledgers = 1;
}

// GetMarketLedgerByIdRequest: Request to fetch a ledger by its primary key.
message GetMarketLedgerByIdRequest {
  // id: DB primary key of the ledger row to retrieve.
  int64 id = 1;
}

// GetMarketLedgerByIdResponse: The ledger row matching the given id.
message GetMarketLedgerByIdResponse {
  // ledger: The requested ledger row.
  MarketLedger ledger = 1;
}
