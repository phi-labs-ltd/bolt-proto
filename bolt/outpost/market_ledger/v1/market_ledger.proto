syntax = "proto3";

package bolt.outpost.market_ledger.v1;

import "bolt/assets/v1/assets.proto";
import "bolt/common/numeric/v1/numeric.proto";
import "bolt/common/partners/v1/partners.proto";
import "bolt/outpost/market_ledger/v1/types.proto";
import "bolt/outpost/settlement/v2/settlement.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

// MarketLedgerService: Internal MM service that tracks swap deltas, manages
// hedge-order lifecycle, and streams live ledger state.
service MarketLedgerService {
  // Streams the current ledger snapshot (all assets) as the first message,
  // then one message per block as new swaps are processed.
  // field_mask paths: "swaps", "hedge_order", "hedge_steps" opt in to those fields.
  rpc SubscribeMarketLedger(SubscribeMarketLedgerRequest) returns (stream SubscribeMarketLedgerResponse);
  // Inserts or replaces the engine config for a single (asset, direction) pair.
  rpc UpsertEngineConfig(UpsertEngineConfigRequest) returns (UpsertEngineConfigResponse);
  // Returns all configs for the given asset (both Long and Short directions).
  rpc GetEngineConfigsForAsset(GetEngineConfigsForAssetRequest) returns (GetEngineConfigsForAssetResponse);
  // Returns all engine configs across all assets and directions.
  rpc GetEngineConfigs(GetEngineConfigsRequest) returns (GetEngineConfigsResponse);
  // Records a new CEX order placement attempt for a ledger hedge cycle.
  rpc RecordHedgeStep(RecordHedgeStepRequest) returns (HedgeStep);
  // Records a terminal fill, closes the ledger cycle, and returns the completed order with all steps.
  rpc RecordHedgeFill(RecordHedgeFillRequest) returns (HedgeOrder);
  // Returns the current Running ledger for the given asset, or absent if none exists.
  rpc GetOpenMarketLedger(GetOpenMarketLedgerRequest) returns (GetOpenMarketLedgerResponse);
  // Returns all Running ledgers across every asset, ordered by asset name.
  rpc GetOpenMarketLedgers(GetOpenMarketLedgersRequest) returns (GetOpenMarketLedgersResponse);
  // Returns the ledger with the given id.
  rpc GetMarketLedgerById(GetMarketLedgerByIdRequest) returns (GetMarketLedgerByIdResponse);
}

// TimeoutStep: One rung of the hedge timeout ladder.
message TimeoutStep {
  // delay: Duration to wait after threshold is crossed before placing this step's order.
  google.protobuf.Duration delay = 1;
  // cex_order_type: Execution strategy used when placing the hedge order at this ladder step.
  CexOrderType cex_order_type = 2;
}

// EngineConfig: Hedging parameters for a single (asset, direction) pair.
message EngineConfig {
  // asset: Asset this config applies to.
  string asset = 1;
  // direction: Position direction (Long or Short) this config applies to.
  Direction direction = 2;
  // threshold: Minimum absolute delta before a hedge order is placed.
  bolt.common.numeric.v1.Fraction threshold = 3;
  // hard_cap: Maximum absolute delta; forces hedging regardless of ladder timing.
  bolt.common.numeric.v1.Fraction hard_cap = 4;
  // timeout_ladder: Ordered ladder steps; each step is tried after the previous times out.
  repeated TimeoutStep timeout_ladder = 5;
  // spread_bps: Spread in basis points applied only to limit ladder steps (typically the first step).
  // The effective quote price is vwap * (1 + spread_bps / 10_000).
  // Ignored for market (spot) order types. Absent if not configured.
  optional uint32 spread_bps = 6;
}

// SwapEvent: A single swap event ingested from the on-chain pool.
message SwapEvent {
  // id: Unique swap identifier: "{tx_digest}-{event_index}".
  string id = 1;
  // tx_id: Transaction digest that contained this swap.
  string tx_id = 2;
  // base_asset: Base asset of the pool (e.g. "SUI"). Resolved from pool context by the ledger service.
  string base_asset = 3;
  // height: Block height at which the swap was included.
  uint64 height = 4;
  // source: Pool contract ID where the swap occurred (pool_id in SwapExecuted).
  string source = 5;
  // sender: Address of the trader who executed the swap (trader in SwapExecuted).
  string sender = 6;
  // input: Asset and amount sent into the pool by this swap (amount_in in SwapExecuted).
  bolt.assets.v1.Balance input = 7;
  // output: Asset and amount received from the pool by this swap (amount_out in SwapExecuted).
  bolt.assets.v1.Balance output = 8;
  // protocol_fee: Bolt protocol fee collected for this swap, denominated in base asset (protocol_fee in SwapExecuted).
  bolt.assets.v1.Balance protocol_fee = 9;
  // lp_fee: Liquidity provider fee collected for this swap, denominated in base asset (lp_fee in SwapExecuted).
  bolt.assets.v1.Balance lp_fee = 10;
  // price: Execution price used by the pool (base/quote rational). Derived from price_used in SwapExecuted (implicit denominator 10^21).
  bolt.common.numeric.v1.Fraction price = 11;
  // base_liquidity: Pool's base asset liquidity after this swap. Zero for events emitted before SwapExecuted gained this field.
  bolt.assets.v1.Balance base_liquidity = 12;
  // swap_type: Buy if pool gave base asset (quote->base); Sell if pool received base asset (base->quote).
  bolt.outpost.settlement.v2.SwapType swap_type = 13;
  // originator: Partner that originated this swap (stored as i32 enum value).
  bolt.common.partners.v1.Partner originator = 14;
  // timestamp: On-chain timestamp if present in the event; absent for older event formats.
  optional google.protobuf.Timestamp timestamp = 15;
  // created_at: When this row was inserted into the DB.
  google.protobuf.Timestamp created_at = 16;
}

// HedgeStep: A single CEX order placement attempt for a ledger hedge cycle.
// Non-terminal — terminal fills are recorded in HedgeOrder.
// Immutable once inserted; index is 0-based per ledger, assigned by the service.
message HedgeStep {
  // id: DB primary key.
  int64 id = 1;
  // ledger_id: FK to the parent bolt_market_ledgers row.
  int64 ledger_id = 2;
  // index: 0-based insertion order per ledger; assigned by the service, not the caller.
  int32 index = 3;
  // cex_order_id: CEX-assigned order ID; absent when MM does not yet have confirmation.
  optional string cex_order_id = 4;
  // cex_order_type: Execution strategy (limit/spot × buy/sell).
  CexOrderType cex_order_type = 5;
  // status: State of this placement attempt. Required; any value may repeat across steps.
  HedgeStepStatus status = 6;
  // price: Limit price at placement (base/quote). 0 for market orders.
  bolt.common.numeric.v1.Fraction price = 7;
  // amount: Amount placed — always in base asset (e.g. SUI).
  // MM is responsible for any conversion required by the specific CEX and order type
  // before calling the exchange; the ledger always stores the base amount.
  bolt.common.numeric.v1.Fraction amount = 8;
  // memo: Optional free-text note (e.g. reason for retry).
  optional string memo = 9;
  // created_at: When this step row was inserted.
  google.protobuf.Timestamp created_at = 10;
}

// HedgeOrder: Terminal CEX hedge order for a ledger cycle. Every row is a closed fill.
//
// All amount fields are in base asset (e.g. SUI) except filled_total (always quote).
//
// Field relationships:
//   exec_amount  = quantity × price     (quote committed at placement; 0 for market orders)
//   filled_total = avg_price × filled_amount
//   residual     = quantity − filled_amount
//
// Gate.io SpotBuy quirk: Gate's response `amount` and `left` are in quote (USDC) for
// market-buy orders. MM must convert to base before calling RecordHedgeFill.
// See: https://www.gate.com/docs/developers/apiv4/en/#create-an-order
//      https://www.gate.com/en-eu/docs/developers/apiv4/#create-an-order
//
//   Gate response (SpotBuy):  amount="65.4194 USDC"  filled_amount="77.11 SUI"  left="0.006987 USDC"
//
//   RecordHedgeFill fields:
//     quantity      = CexOrder.amount          →  77.76 SUI  (MM's original intent, not Gate's USDC amount)
//     filled_amount = Gate.filled_amount        →  77.11 SUI  (already base — use directly)
//     residual      = quantity − filled_amount  →   0.65 SUI  (do NOT use Gate.left directly)
//     filled_total  = Gate.filled_total         →  65.41 USDC (always quote — use directly)
//
// Raw Gate JSON is preserved in response_msg for audit.
//
// Examples:
//
//   Market sell FOK (filled):
//     cex_order_type: SpotSell  price: 0 (market — no limit)
//     quantity: 4 SUI           exec_amount: 0 (market order)
//     filled_amount: 4 SUI      avg_price: 0.8898 USDC/SUI
//     filled_total: 3.5592 USDC  residual: 0 SUI  fee: 0.00106776 USDC
//
//   Market buy FOK (filled):
//     cex_order_type: SpotBuy  price: 0 (market — no limit)
//     quantity: 77.76 SUI  ← always base (CexOrder.amount); Gate processes as ~65.42 USDC internally
//     filled_amount: 77.11 SUI   avg_price: 0.8483 USDC/SUI
//     filled_total: 65.412413 USDC
//     residual: 0.65 SUI  ← base (quantity − filled_amount); Gate.left is USDC — do not use directly
//     fee: 0.023133 SUI
message HedgeOrder {
  // id: DB primary key.
  int64 id = 1;
  // ledger_id: FK to the parent bolt_market_ledgers row.
  int64 ledger_id = 2;
  // base_asset: Base asset being hedged (e.g. "SUI").
  string base_asset = 3;
  // quote_asset: Quote asset used for pricing (e.g. "USDC").
  string quote_asset = 4;
  // quantity: Amount originally ordered — always base asset (e.g. SUI).
  // Use CexOrder.amount, not the CEX response `amount` field (which is in quote for SpotBuy market orders).
  bolt.common.numeric.v1.Fraction quantity = 5;
  // cex_order_type: Execution strategy (limit/spot × buy/sell).
  CexOrderType cex_order_type = 6;
  // fill_status: Terminal fill status — always Filled or PartiallyFilled.
  HedgeFillStatus fill_status = 7;
  // cex_order_id: CEX-assigned order identifier; required at close.
  string cex_order_id = 8;
  // filled_amount: Base amount actually filled (e.g. SUI). Gate `filled_amount` — always base asset.
  bolt.common.numeric.v1.Fraction filled_amount = 9;
  // exec_amount: Quote committed at placement = quantity × price. Always 0 for market orders.
  bolt.common.numeric.v1.Fraction exec_amount = 10;
  // avg_price: Volume-weighted average fill price (quote/base, e.g. USDC/SUI).
  bolt.common.numeric.v1.Fraction avg_price = 11;
  // residual: Unhedged base remainder = quantity − filled_amount. Always base asset.
  // Computed by MM; do not use Gate `left` directly for SpotBuy (it is in quote).
  bolt.common.numeric.v1.Fraction residual = 12;
  // filled_total: Total quote value of all fills = avg_price × filled_amount. Always quote asset.
  bolt.common.numeric.v1.Fraction filled_total = 13;
  // fee: Fee deducted; currency given by fee_currency.
  optional bolt.common.numeric.v1.Fraction fee = 14;
  // fee_currency: Asset in which the fee was taken (e.g. "SUI" or "USDC").
  optional string fee_currency = 15;
  // response_msg: Raw CEX response payload as JSON; preserved for audit.
  optional string response_msg = 16;
  // memo: Optional order-level note.
  optional string memo = 17;
  // created_at: When this order row was inserted.
  google.protobuf.Timestamp created_at = 18;
  // Steps are fetched separately via MarketLedgerEvent field_mask "hedge_steps".
}

// MarketLedgerEvent: Live ledger state for an asset, emitted after processing a block.
message MarketLedgerEvent {
  // ledger: Current state of the ledger cycle for this asset.
  MarketLedger ledger = 1;
  // updated_at: When this ledger row was last modified.
  google.protobuf.Timestamp updated_at = 2;
  // created_at: When this ledger row was first created.
  google.protobuf.Timestamp created_at = 3;
  // swaps: Swap events accumulated in this cycle, in insertion order.
  // Omitted unless requested via field_mask path "swaps".
  repeated SwapEvent swaps = 4;
  // order: Terminal hedge order for this cycle; absent if the ledger has not yet been closed.
  // Omitted unless requested via field_mask path "hedge_order".
  optional HedgeOrder order = 5;
  // steps: CEX placement attempts for this cycle, ordered by index ascending.
  // Omitted unless requested via field_mask path "hedge_steps".
  repeated HedgeStep steps = 6;
  // engine_configs: Engine configs for this asset (up to two entries: one per direction).
  repeated EngineConfig engine_configs = 7;
}

// MarketLedger: A market ledger record returned by query RPCs (no swaps or orders attached).
message MarketLedger {
  // id: DB primary key.
  int64 id = 1;
  // asset: Base asset (e.g. "SUI").
  string asset = 2;
  // delta: Net signed position accumulated in this cycle (base units).
  bolt.common.numeric.v1.Fraction delta = 3;
  // vwap: Volume-weighted average price for accumulated delta.
  bolt.common.numeric.v1.Fraction vwap = 4;
  // status: Lifecycle state of this cycle (running or closed).
  LedgerStatus status = 5;
  // previous_id: FK to the previous cycle row; absent for the first cycle of this asset.
  optional int64 previous_id = 6;
  // previous_residual: Unhedged residual carried forward from the previous cycle.
  bolt.common.numeric.v1.Fraction previous_residual = 7;
  // initial_height: Block height of the first swap in this cycle.
  uint64 initial_height = 8;
  // last_height: Block height of the most recent swap in this cycle.
  uint64 last_height = 9;
}

// SubscribeMarketLedgerRequest: Subscribe to live ledger state updates for all assets.
message SubscribeMarketLedgerRequest {
  // field_mask: When absent, swaps, order, and steps are omitted from each event.
  // Set paths to any combination of "swaps", "hedge_order", "hedge_steps" to opt in.
  optional google.protobuf.FieldMask field_mask = 1;
}

// SubscribeMarketLedgerResponse: Streaming response — first message is the current snapshot
// (all assets), then one message per block as new swaps are processed.
message SubscribeMarketLedgerResponse {
  // events: One event per asset updated in this block, or all assets on the snapshot message.
  repeated MarketLedgerEvent events = 1;
}

// UpsertEngineConfigRequest: Inserts or replaces the engine config for a single (asset, direction) pair.
message UpsertEngineConfigRequest {
  // config: The engine config to upsert.
  EngineConfig config = 1;
}

// UpsertEngineConfigResponse: Returns the upserted config.
message UpsertEngineConfigResponse {
  // config: The upserted engine config.
  EngineConfig config = 1;
}

// GetEngineConfigsForAssetRequest: Returns all configs for a given asset.
message GetEngineConfigsForAssetRequest {
  // asset: Asset to query configs for.
  string asset = 1;
}

// GetEngineConfigsForAssetResponse: Returns up to two configs (one per direction) for the requested asset.
message GetEngineConfigsForAssetResponse {
  // configs: Engine configs for the requested asset.
  repeated EngineConfig configs = 1;
}

// GetEngineConfigsRequest: Returns all engine configs across all assets and directions.
message GetEngineConfigsRequest {}

// GetEngineConfigsResponse: Returns every stored engine config across all (asset, direction) pairs.
message GetEngineConfigsResponse {
  // configs: All engine configs.
  repeated EngineConfig configs = 1;
}

// RecordHedgeStepRequest: Records a new CEX order placement attempt for a ledger hedge cycle.
// Does not create a HedgeOrder row — that happens only at RecordHedgeFill.
//
// swap_ids is required on the first call for a ledger (must be non-empty, unassigned, belong to
// this ledger). Providing swap_ids on subsequent calls for the same ledger is an error.
message RecordHedgeStepRequest {
  // ledger_id: Ledger cycle this step belongs to.
  int64 ledger_id = 1;
  // cex_order_type: Execution strategy (limit/spot × buy/sell).
  CexOrderType cex_order_type = 2;
  // status: State of this placement attempt. Required; any value may repeat across steps.
  HedgeStepStatus status = 3;
  // price: Limit price at placement (base/quote). 0 for market orders.
  bolt.common.numeric.v1.Fraction price = 4;
  // amount: Amount placed — always base asset (e.g. SUI).
  // MM is responsible for any conversion required by the specific CEX and order type
  // before calling the exchange; the ledger always stores the base amount.
  bolt.common.numeric.v1.Fraction amount = 5;
  // cex_order_id: CEX-assigned order ID; omit if not yet confirmed.
  optional string cex_order_id = 6;
  // swap_ids: Swap IDs that make up the delta triggering this hedge.
  // Required on first call; must be empty on subsequent calls for the same ledger.
  repeated string swap_ids = 7;
  // memo: Optional free-text note.
  optional string memo = 8;
}

// RecordHedgeFillRequest: Records a terminal fill, inserts the hedge_orders row,
// and closes the ledger cycle. Requires at least one prior RecordHedgeStep for this ledger.
//
// All amount fields must be in base asset (e.g. SUI) except filled_total (always quote).
//
// Gate.io SpotBuy: Gate's response `amount` and `left` are in quote (USDC) for market-buy.
// See: https://www.gate.com/docs/developers/apiv4/en/#create-an-order
//      https://www.gate.com/en-eu/docs/developers/apiv4/#create-an-order
//   quantity      = CexOrder.amount           (77.76 SUI — MM's original intent)
//   filled_amount = Gate.filled_amount         (77.11 SUI — already base, use directly)
//   residual      = quantity − filled_amount   ( 0.65 SUI — do NOT use Gate.left directly)
//   filled_total  = Gate.filled_total          (65.41 USDC — always quote, use directly)
message RecordHedgeFillRequest {
  // ledger_id: Ledger cycle this fill closes.
  int64 ledger_id = 1;
  // base_asset: Base asset being hedged (e.g. "SUI").
  string base_asset = 2;
  // quote_asset: Quote asset used for pricing (e.g. "USDC").
  string quote_asset = 3;
  // cex_order_type: Execution strategy (limit/spot × buy/sell).
  CexOrderType cex_order_type = 4;
  // quantity: Amount originally ordered — always base asset.
  // Use CexOrder.amount, not Gate response `amount` (which is in quote for SpotBuy market orders).
  bolt.common.numeric.v1.Fraction quantity = 5;
  // cex_order_id: CEX-assigned order identifier; required.
  string cex_order_id = 6;
  // fill_status: Terminal fill status — Filled or PartiallyFilled.
  HedgeFillStatus fill_status = 7;
  // filled_amount: Base amount actually filled. Gate `filled_amount` — always base, use directly.
  bolt.common.numeric.v1.Fraction filled_amount = 8;
  // exec_amount: Quote committed at placement = quantity × price. Always 0 for market orders.
  bolt.common.numeric.v1.Fraction exec_amount = 9;
  // avg_price: Volume-weighted average fill price (quote/base, e.g. USDC/SUI).
  bolt.common.numeric.v1.Fraction avg_price = 10;
  // residual: Unhedged base remainder = quantity − filled_amount. Always base asset.
  // Do not use Gate `left` directly for SpotBuy (it is in quote on Gate.io).
  bolt.common.numeric.v1.Fraction residual = 11;
  // filled_total: Total quote value of all fills = avg_price × filled_amount. Always quote asset.
  bolt.common.numeric.v1.Fraction filled_total = 12;
  // fee: Fee deducted; currency given by fee_currency.
  optional bolt.common.numeric.v1.Fraction fee = 13;
  // fee_currency: Asset in which the fee was taken (e.g. "SUI" or "USDC").
  optional string fee_currency = 14;
  // response_msg: Raw CEX response payload as JSON; preserved for audit.
  optional string response_msg = 15;
  // memo: Optional order-level note.
  optional string memo = 16;
}

// GetOpenMarketLedgerRequest: Returns the current Running ledger for the given asset.
message GetOpenMarketLedgerRequest {
  // asset: Base asset to query (e.g. "SUI").
  string asset = 1;
}

// GetOpenMarketLedgerResponse: Returns the running ledger, or absent if no running cycle exists.
message GetOpenMarketLedgerResponse {
  // ledger: The running ledger for the requested asset; absent if none.
  optional MarketLedger ledger = 1;
}

// GetOpenMarketLedgersRequest: Returns all Running ledgers across every asset.
message GetOpenMarketLedgersRequest {}

// GetOpenMarketLedgersResponse: Returns all running ledgers, ordered by asset name.
message GetOpenMarketLedgersResponse {
  // ledgers: All running ledgers.
  repeated MarketLedger ledgers = 1;
}

// GetMarketLedgerByIdRequest: Returns the ledger with the given id.
message GetMarketLedgerByIdRequest {
  // id: DB primary key of the ledger to fetch.
  int64 id = 1;
}

// GetMarketLedgerByIdResponse: Returns the requested ledger.
message GetMarketLedgerByIdResponse {
  // ledger: The requested ledger.
  MarketLedger ledger = 1;
}
